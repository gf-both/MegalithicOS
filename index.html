<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegalithicOS - Global Ancient Mysteries Map</title>
  <script src="https://unpkg.com/globe.gl@2.33.0/dist/globe.gl.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-hover: #22223a;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-muted: #55556a;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --border: #2a2a3e;
      --scrollbar-bg: #16161e;
      --scrollbar-thumb: #3a3a4e;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      gap: 16px;
    }

    #header .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #header .tagline {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    #header .stats {
      margin-left: auto;
      display: flex;
      gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    #header .stats .stat {
      color: var(--text-secondary);
    }

    #header .stats .stat span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 56px;
      left: 0;
      bottom: 0;
      width: 320px;
      background: rgba(18, 18, 26, 0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      z-index: 90;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    #sidebar.collapsed {
      transform: translateX(-320px);
    }

    #sidebar-toggle {
      position: fixed;
      top: 72px;
      left: 320px;
      z-index: 95;
      width: 32px;
      height: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    #sidebar.collapsed ~ #sidebar-toggle {
      left: 0;
    }

    #sidebar-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-section {
      padding: 16px;
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #search-box {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #search-box::placeholder {
      color: var(--text-muted);
    }

    .layers-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .layers-container::-webkit-scrollbar {
      width: 6px;
    }

    .layers-container::-webkit-scrollbar-track {
      background: var(--scrollbar-bg);
    }

    .layers-container::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 3px;
    }

    /* ── Layer Toggle ── */
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      margin-bottom: 2px;
    }

    .layer-toggle:hover {
      background: var(--bg-hover);
    }

    .layer-toggle .icon {
      font-size: 18px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .layer-toggle .label-group {
      flex: 1;
      min-width: 0;
    }

    .layer-toggle .label {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .layer-toggle .count {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .layer-toggle .switch {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .layer-toggle .switch::after {
      content: '';
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-muted);
      position: absolute;
      top: 2px;
      left: 2px;
      transition: all 0.2s;
    }

    .layer-toggle.active .switch {
      border-color: var(--accent);
      background: var(--accent);
    }

    .layer-toggle.active .switch::after {
      background: white;
      left: 18px;
    }

    .layer-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Info Panel ── */
    #info-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 380px;
      max-height: 300px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 80;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      overflow-y: auto;
    }

    #info-panel.visible {
      display: block;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #info-panel .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
    }

    #info-panel .close-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    #info-panel .site-layer {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #info-panel .site-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    #info-panel .site-coords {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    #info-panel .site-info {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Globe ── */
    #globe-container {
      width: 100vw;
      height: 100vh;
      background: var(--bg-primary);
    }

    /* ── Quick actions ── */
    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
    }

    .quick-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .quick-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent);
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading .loading-text {
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    /* ── Search results ── */
    #search-results {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 4px;
    }

    .search-result {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .search-result:hover {
      background: var(--bg-hover);
    }

    .search-result .sr-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .search-result .sr-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result .sr-layer {
      font-size: 10px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">INITIALIZING MEGALITHICOS</div>
</div>

<div id="header">
  <div class="logo">MEGALITHIC<span style="color: #fd79a8">OS</span></div>
  <div class="tagline">GLOBAL ANCIENT MYSTERIES MAP</div>
  <div class="stats">
    <div class="stat">Sites: <span id="total-sites">0</span></div>
    <div class="stat">Visible: <span id="visible-sites">0</span></div>
    <div class="stat">Layers: <span id="active-layers">0</span></div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-title">Search Sites</div>
    <input type="text" id="search-box" placeholder="Search all sites..." />
    <div id="search-results"></div>
  </div>
  <div class="sidebar-section" style="padding-top: 0;">
    <div class="sidebar-title">Layers</div>
  </div>
  <div class="layers-container" id="layers-list"></div>
  <div class="quick-actions">
    <button class="quick-btn" onclick="toggleAllLayers(true)">All On</button>
    <button class="quick-btn" onclick="toggleAllLayers(false)">All Off</button>
    <button class="quick-btn" onclick="resetView()">Reset View</button>
  </div>
</div>

<button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>

<div id="info-panel">
  <button class="close-btn" onclick="closeInfoPanel()">✕</button>
  <div class="site-layer" id="panel-layer"></div>
  <div class="site-name" id="panel-name"></div>
  <div class="site-coords" id="panel-coords"></div>
  <div class="site-info" id="panel-info"></div>
</div>

<div id="globe-container"></div>

<script src="data.js"></script>
<script>
// ============================================================
// Data mapping
// ============================================================
const LAYER_DATA = {
  megalithic: megalithicSites,
  sunkenCities: sunkenCities,
  hiddenPyramids: hiddenPyramids,
  magneticAnomalies: magneticAnomalies,
  ufoCrashes: ufoCrashes,
  natronDeposits: natronDeposits,
  leyLines: leyLines,
  geoglyphs: geoglyphs,
  ancientObservatories: ancientObservatories,
  ancientQuarries: ancientQuarries,
  underwaterAnomalies: underwaterAnomalies,
  ooparts: ooparts
};

// State
const layerVisibility = {};
Object.keys(LAYER_CONFIG).forEach(k => {
  layerVisibility[k] = LAYER_CONFIG[k].visible;
});

let allPoints = [];
let globe;

// ============================================================
// Build flat points array
// ============================================================
function buildPoints() {
  allPoints = [];
  Object.entries(LAYER_DATA).forEach(([layerKey, sites]) => {
    const config = LAYER_CONFIG[layerKey];
    sites.forEach(site => {
      allPoints.push({
        ...site,
        layerKey,
        color: config.color,
        layerLabel: config.label,
        icon: config.icon
      });
    });
  });
}

function getVisiblePoints() {
  return allPoints.filter(p => layerVisibility[p.layerKey]);
}

// ============================================================
// Initialize Globe
// ============================================================
function initGlobe() {
  const container = document.getElementById('globe-container');

  globe = Globe()(container)
    .globeImageUrl('https://unpkg.com/three-globe@2.33.0/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe@2.33.0/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe@2.33.0/example/img/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('#6c5ce7')
    .atmosphereAltitude(0.2)
    .pointsData(getVisiblePoints())
    .pointAltitude(0.01)
    .pointRadius(d => {
      // Bigger points for key sites
      if (['Great Pyramid of Giza', 'Stonehenge', 'Göbekli Tepe', 'Machu Picchu', 'Angkor Wat', 'Teotihuacan', 'Easter Island (Rapa Nui)', 'Roswell', 'Baalbek'].includes(d.name)) {
        return 0.35;
      }
      return 0.2;
    })
    .pointColor(d => d.color)
    .pointLabel('')
    .onPointClick(handlePointClick)
    .onPointHover(handlePointHover)
    // Arcs for ley lines
    .arcsData(getVisibleArcs())
    .arcStartLat(d => d.startLat)
    .arcStartLng(d => d.startLng)
    .arcEndLat(d => d.endLat)
    .arcEndLng(d => d.endLng)
    .arcColor(() => ['rgba(26, 188, 156, 0.6)', 'rgba(26, 188, 156, 0.2)'])
    .arcDashLength(0.4)
    .arcDashGap(0.2)
    .arcDashAnimateTime(4000)
    .arcStroke(0.4)
    // Rings on click
    .ringsData([])
    .ringColor(() => t => `rgba(108, 92, 231, ${1 - t})`)
    .ringMaxRadius(3)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(1500);

  // Auto-rotate
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.4;
  globe.controls().enableDamping = true;

  // Initial camera
  globe.pointOfView({ lat: 30, lng: 31, altitude: 2.5 });

  // Hide loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 1500);
}

// ============================================================
// Ley Line Arcs
// ============================================================
function getVisibleArcs() {
  if (!layerVisibility.leyLines) return [];
  const arcs = [];
  leyLinePaths.forEach(path => {
    for (let i = 0; i < path.points.length - 1; i++) {
      arcs.push({
        startLat: path.points[i].lat,
        startLng: path.points[i].lng,
        endLat: path.points[i + 1].lat,
        endLng: path.points[i + 1].lng,
        name: path.name
      });
    }
  });
  return arcs;
}

// ============================================================
// Interactions
// ============================================================
function handlePointClick(point) {
  if (!point) return;

  // Stop rotation
  globe.controls().autoRotate = false;

  // Ring effect
  globe.ringsData([{ lat: point.lat, lng: point.lng }]);

  // Fly to
  globe.pointOfView({ lat: point.lat, lng: point.lng, altitude: 1.0 }, 1000);

  // Show panel
  showInfoPanel(point);
}

function handlePointHover(point) {
  document.body.style.cursor = point ? 'pointer' : 'default';
}

function showInfoPanel(point) {
  const panel = document.getElementById('info-panel');
  document.getElementById('panel-layer').textContent = `${point.icon} ${point.layerLabel}`;
  document.getElementById('panel-layer').style.color = point.color;
  document.getElementById('panel-name').textContent = point.name;
  document.getElementById('panel-coords').textContent = `${point.lat.toFixed(4)}°, ${point.lng.toFixed(4)}°`;
  document.getElementById('panel-info').textContent = point.info;
  panel.classList.add('visible');
}

function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('visible');
  globe.ringsData([]);
}

// ============================================================
// Layer Controls
// ============================================================
function buildLayerToggles() {
  const container = document.getElementById('layers-list');
  container.innerHTML = '';

  Object.entries(LAYER_CONFIG).forEach(([key, config]) => {
    const count = LAYER_DATA[key] ? LAYER_DATA[key].length : 0;
    const div = document.createElement('div');
    div.className = `layer-toggle ${layerVisibility[key] ? 'active' : ''}`;
    div.dataset.layer = key;
    div.innerHTML = `
      <span class="icon">${config.icon}</span>
      <div class="label-group">
        <div class="label">${config.label}</div>
        <div class="count">${count} sites</div>
      </div>
      <div class="dot" style="background: ${config.color}"></div>
      <div class="switch"></div>
    `;
    div.addEventListener('click', () => {
      layerVisibility[key] = !layerVisibility[key];
      div.classList.toggle('active');
      updateGlobe();
    });
    container.appendChild(div);
  });
}

function toggleAllLayers(on) {
  Object.keys(layerVisibility).forEach(k => layerVisibility[k] = on);
  document.querySelectorAll('.layer-toggle').forEach(el => {
    el.classList.toggle('active', on);
  });
  updateGlobe();
}

function updateGlobe() {
  globe.pointsData(getVisiblePoints());
  globe.arcsData(getVisibleArcs());
  updateStats();
}

function updateStats() {
  const visible = getVisiblePoints().length;
  const total = allPoints.length;
  const activeLayers = Object.values(layerVisibility).filter(v => v).length;

  document.getElementById('total-sites').textContent = total;
  document.getElementById('visible-sites').textContent = visible;
  document.getElementById('active-layers').textContent = activeLayers;
}

function resetView() {
  globe.pointOfView({ lat: 30, lng: 31, altitude: 2.5 }, 1000);
  globe.controls().autoRotate = true;
  closeInfoPanel();
}

// ============================================================
// Sidebar
// ============================================================
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
  const btn = document.getElementById('sidebar-toggle');
  btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
}

// ============================================================
// Search
// ============================================================
const searchBox = document.getElementById('search-box');
const searchResults = document.getElementById('search-results');

searchBox.addEventListener('input', () => {
  const q = searchBox.value.toLowerCase().trim();
  searchResults.innerHTML = '';

  if (q.length < 2) return;

  const matches = allPoints
    .filter(p => p.name.toLowerCase().includes(q) || p.info.toLowerCase().includes(q))
    .slice(0, 12);

  matches.forEach(p => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = `
      <div class="sr-dot" style="background: ${p.color}"></div>
      <div class="sr-name">${p.name}</div>
      <div class="sr-layer">${p.icon}</div>
    `;
    div.addEventListener('click', () => {
      handlePointClick(p);
      searchBox.value = '';
      searchResults.innerHTML = '';
    });
    searchResults.appendChild(div);
  });
});

// ============================================================
// Init
// ============================================================
buildPoints();
buildLayerToggles();
initGlobe();
updateStats();

// Handle resize
window.addEventListener('resize', () => {
  globe.width(window.innerWidth);
  globe.height(window.innerHeight);
});
</script>

</body>
</html>
